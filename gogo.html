<!DOCTYPE html>
<html>
<head>
<title>Recipes</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: url('nuy.png') center/cover no-repeat;
}

/* OVERLAY */
.overlay {
  background: rgba(255,255,255,0.85);
  min-height: 100vh;
  padding: 40px;
  text-align: center;
}

/* TITLE */
h1 {
  font-family: 'Playfair Display';
  font-size: 50px;
  color: #5a2e0c;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 25px;
  margin-top: 40px;
}

/* CARD */
.card {
  background: white;
  border-radius: 20px;
  padding: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

/* IMAGE */
.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 15px;
}

/* TITLE */
.card h3 {
  margin: 10px 0;
  color: #2c1b10;
}

/* LINK */
.card a {
  text-decoration: none;
  color: inherit;
}

/* BACK */
.back {
  margin-top: 40px;
}

.back a {
  padding: 10px 20px;
  background: #ff7a00;
  color: white;
  text-decoration: none;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="overlay">

  <h1>🍽️ All Recipes</h1>
  <p>Pick your favorite dish and start cooking!</p>

  <div class="container">

    <!-- TRADITIONAL -->
    <div class="card">
      
        <img src="shiro.jpg">
        <h3>Shiro Wot</h3>
      </a>
    </div>

    <div class="card">
      
        <img src="doro.jpg">
        <h3>Doro Wot</h3>
      </a>
    </div>

    <div class="card">
      
        <img src="firfir.jpg">
        <h3>Firfir</h3>
      </a>
    </div>

    <!-- MODERN -->
    <div class="card">
      
        <img src="burgerchick.jpg">
        <h3>Burger</h3>
      </a>
    </div>

    <div class="card">
      
        <img src="pol.jpg">
        <h3>Chicken Roast</h3>
      </a>
    </div>

    <div class="card">
     
        <img src="lazagna.jpg">
        <h3>Lasagna</h3>
      </a>
    </div>

  </div>

  <div class="back">
    <a href="index.html">⬅ Back Home</a>
  </div>

</div>

</body>
</html>
