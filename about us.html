<!DOCTYPE html>
<html>
<head>
<title>About Us</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: url('gru.png') center/cover no-repeat;
}

/* OVERLAY */
.overlay {
  background: rgba(0,0,0,0.6);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* BOX */
.box {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding: 40px;
  border-radius: 20px;
  width: 60%;
  color: white;
  text-align: center;
}

/* TITLE */
h1 {
  font-family: 'Playfair Display';
  font-size: 50px;
  margin-bottom: 10px;
}

/* TEXT */
p {
  line-height: 1.8;
  font-size: 18px;
}

/* BUTTON */
a {
  display: inline-block;
  margin-top: 20px;
  padding: 10px 20px;
  background: #ff7a00;
  color: white;
  text-decoration: none;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="overlay">

  <div class="box">
    <h1>About TasteBridge 🍲</h1>

    <p>
      TasteBridge is a place where traditional Ethiopian recipes meet modern cooking ideas.
    </p>

    <p>
      From <b>Shiro Wot</b> and <b>Doro Wot</b> to <b>Burgers</b> and <b>Lasagna</b>,
      we connect flavors, cultures, and creativity.
    </p>

    <p>
      Our goal is to make cooking simple, fun, and beautiful for everyone.
    </p>

    <a href="index.html">⬅ Back Home</a>
  </div>

</div>

</body>
</html>
