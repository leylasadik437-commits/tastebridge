<!DOCTYPE html>
<html>
<head>
<title>Favorites</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: url('yu.jpg') center/cover no-repeat;
}

/* OVERLAY */
.overlay {
  background: rgba(0,0,0,0.65);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* BOX */
.box {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding: 40px;
  border-radius: 20px;
  width: 60%;
  color: white;
  text-align: center;
}

/* TITLE */
h1 {
  font-family: 'Playfair Display';
  font-size: 50px;
}

/* TEXT */
p {
  font-size: 18px;
  line-height: 1.6;
}

/* BACK BUTTON */
a {
  display: inline-block;
  margin-top: 20px;
  padding: 10px 20px;
  background: #ff4d6d;
  color: white;
  text-decoration: none;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="overlay">

  <div class="box">
    <h1>❤️ Your Favorite Recipes</h1>

    <p>
      All the recipes you love will appear here.
    </p>

    <p>
      Save your favorite dishes and enjoy them anytime!
    </p>

    <a href="index.html">⬅ Back Home</a>
  </div>

</div>

</body>
</html>
